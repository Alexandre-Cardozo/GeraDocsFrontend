<!-- @dsCard group="Colors" viewport="700x140" name="Doc Accents & Gradients" subtitle="Per-document accents; the only three gradients" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;background:#fff;display:flex;gap:16px;font-family:var(--font-body)}
.col{flex:1;display:flex;gap:8px}
.sw{flex:1;height:100px;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px}
.sw b{font-size:11px}.sw span{font-size:9px;font-family:var(--font-mono);opacity:.7}</style></head>
<body>
<div class="col">
<div class="sw" style="background:var(--doc-etp-bg);color:var(--doc-etp)"><b>ETP</b><span>#2563EB</span></div>
<div class="sw" style="background:var(--doc-tr-bg);color:var(--doc-tr)"><b>TR</b><span>#0D9488</span></div>
<div class="sw" style="background:var(--doc-cotacao-bg);color:var(--doc-cotacao)"><b>Cotação</b><span>#7C3AED</span></div>
<div class="sw" style="background:var(--doc-mapa-bg);color:var(--doc-mapa)"><b>Mapa Riscos</b><span>#B45309</span></div>
</div>
<div class="col">
<div class="sw" style="background:var(--gradient-brand);color:#fff"><b>brand</b><span>135° royal→electric</span></div>
<div class="sw" style="background:var(--gradient-user);color:#fff"><b>avatar</b><span>135° petroleum→royal</span></div>
<div class="sw" style="background:var(--gradient-panel);color:#fff"><b>panel</b><span>135° #1E3A5F→#0D3B66</span></div>
</div>
</body></html>
