<!-- @dsCard group="Colors" viewport="700x150" name="Brand Palette" subtitle="Navy, petroleum, royal, electric, slate, ice" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;background:#fff;display:flex;gap:10px}
.sw{flex:1;height:110px;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff}
.sw b{font-size:12px;font-family:var(--font-display)}.sw span{font-size:10px;font-family:var(--font-mono);opacity:.75}</style></head>
<body>
<div class="sw" style="background:var(--color-navy)"><b>Navy</b><span>#071A3D</span></div>
<div class="sw" style="background:var(--color-petroleum)"><b>Petróleo</b><span>#0D3B66</span></div>
<div class="sw" style="background:var(--color-royal)"><b>Royal</b><span>#2563EB</span></div>
<div class="sw" style="background:var(--color-electric)"><b>Elétrico</b><span>#38BDF8</span></div>
<div class="sw" style="background:var(--color-slate)"><b>Slate</b><span>#64748B</span></div>
<div class="sw" style="background:var(--color-ice);color:var(--color-navy);border:1px solid var(--color-border)"><b>Gelo</b><span style="opacity:.6">#F8FAFC</span></div>
</body></html>
