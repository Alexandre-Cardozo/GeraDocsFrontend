<!-- @dsCard group="Colors" viewport="700x140" name="Neutrals" subtitle="Slate text scale + surfaces and borders" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;background:#fff;display:flex;gap:8px}
.sw{flex:1;height:100px;border-radius:8px;border:1px solid var(--color-border-soft);display:flex;flex-direction:column;justify-content:flex-end;padding:8px}
.sw b{font-size:11px;font-family:var(--font-body)}.sw span{font-size:9px;font-family:var(--font-mono);opacity:.7}</style></head>
<body>
<div class="sw" style="background:#071A3D;color:#fff"><b>text-1</b><span>#071A3D</span></div>
<div class="sw" style="background:#374151;color:#fff"><b>text-2</b><span>#374151</span></div>
<div class="sw" style="background:#64748B;color:#fff"><b>text-3</b><span>#64748B</span></div>
<div class="sw" style="background:#94A3B8;color:#fff"><b>muted</b><span>#94A3B8</span></div>
<div class="sw" style="background:#CBD5E1"><b>faint</b><span>#CBD5E1</span></div>
<div class="sw" style="background:#E2E8F0"><b>border</b><span>#E2E8F0</span></div>
<div class="sw" style="background:#F1F5F9"><b>border-soft</b><span>#F1F5F9</span></div>
<div class="sw" style="background:#F8FAFC"><b>app bg</b><span>#F8FAFC</span></div>
<div class="sw" style="background:#FFFFFF"><b>surface</b><span>#FFFFFF</span></div>
</body></html>
