<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;background:#fff;font-family:var(--font-body)}
.diagram{display:flex;height:120px;border:1px solid var(--color-border);border-radius:8px;overflow:hidden}
.lbl{font-size:10px;font-family:var(--font-mono)}</style></head>
<body>
<div class="diagram">
  <div style="width:120px;background:var(--color-navy);color:rgba(255,255,255,0.7);display:flex;align-items:center;justify-content:center" class="lbl">sidebar 240px</div>
  <div style="width:100px;background:#fff;border-right:1px solid var(--color-border);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted)" class="lbl">rail 280px</div>
  <div style="flex:1;display:flex;flex-direction:column">
    <div style="height:30px;border-bottom:1px solid var(--color-border);display:flex;align-items:center;padding:0 10px;color:var(--color-text-muted)" class="lbl">header 60px</div>
    <div style="flex:1;background:#F8FAFC;display:flex;align-items:center;justify-content:center;color:var(--color-text-muted)" class="lbl">content · pad 28px · max 1200px (880 wizard)</div>
  </div>
</div>
<div style="font-size:11px;color:var(--color-text-muted);margin-top:10px">Spacing rhythm 4/8/12/16/20/24/28 · controls 36px · inputs 38px · gaps 16–20px between cards</div>
</body></html>
