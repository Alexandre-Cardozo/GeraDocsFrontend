<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GeraDocs — UI Kit</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>html, body, #root { height: 100%; margin: 0; } body { background: #F8FAFC; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="DashboardScreen.jsx"></script>
<script type="text/babel" src="ProcessListScreen.jsx"></script>
<script type="text/babel" src="NewProcessScreen.jsx"></script>
<script type="text/babel" src="ETPFormScreen.jsx"></script>
<script type="text/babel">
const DSA = window.LAHHMGeraDocsDesignSystem_11bcef;
const titles = {
  dashboard: "Dashboard",
  processes: "Processos de Contratação",
  "new-process": "Novo Processo",
  "etp-form": "Estudo Técnico Preliminar",
  approvals: "Aprovações",
  documents: "Documentos Gerados",
  settings: "Configurações da Prefeitura",
};
function Placeholder({ label }) {
  return (
    <div style={{ padding: 60, textAlign: "center", color: "#94A3B8" }} data-screen-label={label}>
      <p style={{ margin: 0, fontSize: 14, fontWeight: 500 }}>{label} — não recriado neste UI kit (existe no protótipo original).</p>
    </div>
  );
}
function App() {
  const [view, setView] = React.useState("dashboard");
  const navigate = (v) => setView(v);
  const showCta = view === "dashboard" || view === "processes";
  return (
    <div style={{ display: "flex", height: "100vh", overflow: "hidden", background: "#F8FAFC" }}>
      <DSA.Sidebar currentView={view} navigate={navigate} />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        <DSA.Header title={titles[view]} cta={showCta ? "Novo Processo" : undefined} onCta={() => navigate("new-process")} />
        <main style={{ flex: 1, overflowY: "auto" }}>
          {view === "dashboard" && <DashboardScreen navigate={navigate} />}
          {view === "processes" && <ProcessListScreen navigate={navigate} />}
          {view === "new-process" && <NewProcessScreen navigate={navigate} />}
          {view === "etp-form" && <ETPFormScreen navigate={navigate} />}
          {(view === "approvals" || view === "documents" || view === "settings") && <Placeholder label={titles[view]} />}
        </main>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
