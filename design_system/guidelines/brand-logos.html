<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;background:#fff;display:flex;gap:16px;align-items:center;font-family:var(--font-body)}

<div class="box"><img src="../assets/geradocs-mark.png" alt="GeraDocs mark" style="height:78px"><div class="cap">geradocs-mark.png</div></div>

      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>

    <div style="font-size:10px;color:rgba(255,255,255,0.4);font-weight:500;letter-spacing:0.5px;text-transform:uppercase">LAHHM · Gov</div></div>
  </div>
