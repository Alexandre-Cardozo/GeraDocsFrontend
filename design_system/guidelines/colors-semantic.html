<!-- @dsCard group="Colors" viewport="700x150" name="Semantic & Status" subtitle="Success, warning, danger + status badge tints" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;background:#fff;font-family:var(--font-body)}
.row{display:flex;gap:8px;margin-bottom:12px}
.sw{flex:1;height:52px;border-radius:8px;display:flex;flex-direction:column;justify-content:center;padding:0 10px;color:#fff}
.sw b{font-size:11px}.sw span{font-size:9px;font-family:var(--font-mono);opacity:.8}
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:600}
.dot{width:5px;height:5px;border-radius:999px}</style></head>
<body>
<div class="row">
<div class="sw" style="background:var(--color-success)"><b>Success</b><span>#10B981</span></div>
<div class="sw" style="background:var(--color-warning)"><b>Warning</b><span>#F59E0B</span></div>
<div class="sw" style="background:var(--color-danger)"><b>Danger</b><span>#EF4444</span></div>
<div class="sw" style="background:var(--color-info)"><b>Info</b><span>#38BDF8</span></div>
</div>
<div class="row" style="margin:0;flex-wrap:wrap">
<span class="pill" style="background:#F1F5F9;color:#475569"><span class="dot" style="background:#94A3B8"></span>Rascunho</span>
<span class="pill" style="background:#FEF3C7;color:#92400E"><span class="dot" style="background:#F59E0B"></span>Em Revisão</span>
<span class="pill" style="background:#EFF6FF;color:#1D4ED8"><span class="dot" style="background:#3B82F6"></span>Aguardando</span>
<span class="pill" style="background:#ECFDF5;color:#065F46"><span class="dot" style="background:#10B981"></span>Aprovado</span>
<span class="pill" style="background:#FEF2F2;color:#991B1B"><span class="dot" style="background:#EF4444"></span>Rejeitado</span>
<span class="pill" style="background:#F0FDF4;color:#15803D"><span class="dot" style="background:#22C55E"></span>Concluído</span>
</div>
</body></html>
