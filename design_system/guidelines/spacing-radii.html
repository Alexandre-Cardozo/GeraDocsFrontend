<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;background:#fff;display:flex;gap:14px;align-items:flex-end;font-family:var(--font-body)}
.r{background:#EFF6FF;border:1px solid var(--color-royal);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--color-royal)}
.cap{font-size:10px;color:var(--color-text-muted);text-align:center;margin-top:6px;font-family:var(--font-mono)}</style></head>
<body>
<div><div class="r" style="width:110px;height:80px;border-radius:12px">12px</div><div class="cap">cards · tables</div></div>
<div><div class="r" style="width:110px;height:80px;border-radius:10px">10px</div><div class="cap">chips · banners</div></div>
<div><div class="r" style="width:110px;height:80px;border-radius:8px">8px</div><div class="cap">inputs · buttons</div></div>
<div><div class="r" style="width:110px;height:80px;border-radius:6px">6px</div><div class="cap">pills · tags</div></div>
<div><div class="r" style="width:110px;height:80px;border-radius:999px">999</div><div class="cap">badges · toggles</div></div>
</body></html>
