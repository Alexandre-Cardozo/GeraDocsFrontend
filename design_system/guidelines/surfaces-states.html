<!-- @dsCard group="Spacing" viewport="700x160" name="Surfaces & States" subtitle="Flat cards, hover fills, selected borders — no shadows" -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;background:#F8FAFC;display:flex;gap:12px;font-family:var(--font-body)}
.c{flex:1;border-radius:12px;padding:14px;font-size:12px}
.t{font-weight:700;font-family:var(--font-display);font-size:13px;color:var(--text-body);margin-bottom:4px}
.s{color:var(--text-secondary);font-size:11px}</style></head>
<body>
<div class="c" style="background:#fff;border:1px solid var(--color-border)"><div class="t">Card padrão</div><div class="s">Borda #E2E8F0, sem sombra</div></div>
<div class="c" style="background:#F8FAFC;border:1px solid var(--color-border)"><div class="t">Hover</div><div class="s">Fundo → #F8FAFC, 0.15s</div></div>
<div class="c" style="background:#EFF6FF;border:2px solid var(--color-royal)"><div class="t">Selecionado</div><div class="s">2px royal + tint #EFF6FF</div></div>
<div class="c" style="background:var(--gradient-panel);color:#fff"><div class="t" style="color:#fff">Painel escuro</div><div class="s" style="color:rgba(255,255,255,0.65)">Destaques institucionais</div></div>
</body></html>
